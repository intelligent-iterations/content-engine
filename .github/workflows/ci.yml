name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Create .env from example
        run: cp .env.example .env

      - name: Write Grok storage state
        if: env.GROK_STORAGE_STATE != ''
        env:
          GROK_STORAGE_STATE: ${{ secrets.GROK_STORAGE_STATE }}
        run: |
          mkdir -p auth
          echo "$GROK_STORAGE_STATE" | base64 -d > auth/grok-storage-state.json

      - name: Run overlay test
        run: npm run test:overlay

      - name: Run Grok auth test
        if: env.GROK_STORAGE_STATE != ''
        env:
          GROK_STORAGE_STATE: ${{ secrets.GROK_STORAGE_STATE }}
        run: npm run test:grok:auth

      - name: Run Grok image test
        if: env.XAI_API_KEY != ''
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: npm run test:grok:image

      - name: Cleanup auth files
        if: always()
        run: rm -rf auth/
