name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Create .env from example
        run: cp .env.example .env

      - name: Run overlay test
        run: npm run test:overlay

      - name: Run Grok image test
        if: env.XAI_API_KEY != ''
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: npm run test:grok:image

  post:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Create .env from example
        run: cp .env.example .env

      # --- Carousel posts ---

      - name: Write Instagram cookies
        if: env.INSTAGRAM_COOKIES != ''
        env:
          INSTAGRAM_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}
        run: |
          mkdir -p cookies
          echo "$INSTAGRAM_COOKIES" | base64 -d > cookies/instagram_cookies.json

      - name: Write TikTok cookies
        if: env.TIKTOK_COOKIES != ''
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
        run: |
          mkdir -p cookies
          echo "$TIKTOK_COOKIES" | base64 -d > cookies/tiktok_cookies.json

      - name: Write X cookies
        if: env.X_COOKIES != ''
        env:
          X_COOKIES: ${{ secrets.X_COOKIES }}
        run: |
          mkdir -p cookies
          echo "$X_COOKIES" | base64 -d > cookies/x_cookies.json

      - name: Test carousel post to Instagram
        if: env.INSTAGRAM_COOKIES != ''
        env:
          INSTAGRAM_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}
        run: npm run test:post:carousel:instagram

      - name: Test carousel post to X
        if: env.X_COOKIES != ''
        env:
          X_COOKIES: ${{ secrets.X_COOKIES }}
        run: npm run test:post:carousel:x

      # --- Video posts ---

      - name: Test video post to TikTok
        if: env.TIKTOK_COOKIES != ''
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
        run: npm run test:post:video:tiktok

      - name: Test video post to Instagram
        if: env.INSTAGRAM_COOKIES != ''
        env:
          INSTAGRAM_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}
        run: npm run test:post:video:instagram

      - name: Test video post to X
        if: env.X_COOKIES != ''
        env:
          X_COOKIES: ${{ secrets.X_COOKIES }}
        run: npm run test:post:video:x
